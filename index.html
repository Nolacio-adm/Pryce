<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Estoque PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/vanilla-masker@1.2.0/build/vanilla-masker.min.js"></script>
    <style>
        /* Estilos otimizados para Mobile First */
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background: #f4f7f6; margin: 0; }
        #reader { width: 100%; max-width: 500px; border-radius: 12px; overflow: hidden; background: #000; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-top: 15px; width: 100%; max-width: 460px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .btn-success { background: #28a745; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-primary { background: #007bff; color: white; font-size: 1.1em; }
        #result { margin-top: 10px; font-weight: bold; min-height: 40px; padding: 12px; border-radius: 6px; display: none; }
        .success { color: #155724; background: #d4edda; display: block !important; }
        .error { color: #721c24; background: #f8d7da; display: block !important; }
        .progress-container { width: 100%; max-width: 460px; margin-bottom: 15px; }
        #priceSection { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <h2 style="margin: 10px 0;">Scanner de Estoque</h2>

    <div class="progress-container">
        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #555;">
            <span>Progresso da Coleta</span>
            <strong id="txtProgresso">0/0</strong>
        </div>
        <div style="width: 100%; background: #ddd; height: 12px; border-radius: 6px; overflow: hidden;">
            <div id="barraProgresso" style="width: 0%; height: 100%; background: #28a745; transition: width 0.4s ease-out;"></div>
        </div>
    </div>

    <!-- Área de Entrada -->
    <div id="scannerArea" style="width: 100%; max-width: 500px;">
        <div id="reader"></div>
        <div id="manualArea" class="card">
            <p style="margin: 0 0 10px 0; font-size: 14px; color: #666;">Entrada Manual:</p>
            <input type="text" id="inputManual" inputmode="numeric" pattern="[0-9]*" placeholder="Digite o código de barras">
            <button onclick="verificarManual()" class="btn-secondary">Verificar Produto</button>
        </div>
    </div>

    <!-- Formulário de Preço -->
    <div id="formSection" class="card" style="display: none;">
        <div id="result"></div>
        <div id="priceSection">
            <p style="font-weight: bold; margin-bottom: 10px;">Informe o Preço Atual:</p>
            <input type="text" id="inputPreco" inputmode="decimal" placeholder="R$ 0,00" style="font-size: 1.8em; text-align: center;">
            <button class="btn-primary" onclick="salvarPreco()">Confirmar e Voltar</button>
            <button class="btn-secondary" onclick="resetarApp()" style="margin-top: 10px; background: transparent; color: #666;">Cancelar</button>
        </div>
    </div>

<script>
    let codigoAtual = ""; 
    let scannerIniciado = false;
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwfhj30NWTl2vXea_mqFAO21lo9s1yiLJt0S5YCDAUhq9JKEyar6qNL_p4DKO-UZCSE/exec";

    // Inicialização do Scanner
    const html5QrCode = new Html5QrcodeScanner("reader", {
        fps: 10,
        qrbox: {width: 250, height: 150},
        aspectRatio: 1.0,
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
    });

    function iniciarCamera() {
        html5QrCode.render((decodedText) => {
            processarCodigo(decodedText);
        });
        scannerIniciado = true;
    }

    function processarCodigo(codigo) {
        codigoAtual = codigo;
        
        // Interface: Troca rápida de telas
        document.getElementById('scannerArea').style.display = 'none';
        document.getElementById('formSection').style.display = 'block';
        document.getElementById('priceSection').style.display = 'none';
        
        // Para a câmera para economizar bateria e CPU
        html5QrCode.clear();
        scannerIniciado = false;

        enviarConsulta(codigo);
    }

    function verificarManual() {
        let cod = document.getElementById('inputManual').value.trim();
        if (cod) processarCodigo(cod);
        else alert("Digite um código!");
    }

    function enviarConsulta(codigo) {
        const resultDiv = document.getElementById('result');
        resultDiv.className = ''; 
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = "⏳ Buscando item...";

        chamadaJSONP(`${URL_SCRIPT}?barcode=${encodeURIComponent(codigo)}&callback=retornoGoogle`, 'jsonp-request');
    }

    function retornoGoogle(res) {
        const resultDiv = document.getElementById('result');
        const priceSection = document.getElementById('priceSection');
        
        if (res.stats) {
            localStorage.setItem('stats_coleta', JSON.stringify(res.stats));
            atualizarInterfaceProgresso(res.stats);
        }

        if(res.status === "sucesso") {
            resultDiv.className = 'success';
            resultDiv.innerHTML = `<h2 style="margin:0">${res.nome}</h2><small>${res.embalagem}</small>`;
            priceSection.style.display = 'block';
            setTimeout(() => document.getElementById('inputPreco').focus(), 100);
        } else if (res.status === "salvo") {
            // Feedback de sucesso e reset sem reload
            resultDiv.className = 'success';
            resultDiv.innerHTML = "✅ Preço salvo com sucesso!";
            
            // Incremento visual imediato
            atualizarProgressoManual();
            
            setTimeout(() => resetarApp(), 1500);
        } else {
            resultDiv.className = 'error';
            resultDiv.innerHTML = "❌ Não cadastrado no banco.";
            setTimeout(() => resetarApp(), 2500);
        }
    }

    function salvarPreco() {
        let precoFormatado = document.getElementById('inputPreco').value;
        let precoNumerico = precoFormatado.replace("R$", "").trim().replace(/\./g, "").replace(",", ".");
        
        if(!precoNumerico || precoNumerico === "0.00") {
            alert("Digite um preço válido!");
            return;
        }

        document.getElementById('result').innerHTML = "⏳ Gravando na planilha...";
        chamadaJSONP(`${URL_SCRIPT}?barcode=${encodeURIComponent(codigoAtual)}&preco=${encodeURIComponent(precoNumerico)}&callback=retornoGoogle`, 'save-request');
    }

    // MELHORIA: Função genérica para chamadas JSONP (mais limpo)
    function chamadaJSONP(url, id) {
        const oldScript = document.getElementById(id);
        if (oldScript) oldScript.remove();
        const script = document.createElement('script');
        script.id = id;
        script.src = url;
        script.onerror = () => {
            document.getElementById('result').className = 'error';
            document.getElementById('result').innerHTML = "❌ Erro de conexão.";
            setTimeout(resetarApp, 2000);
        };
        document.body.appendChild(script);
    }

    // MELHORIA: Resetar App sem recarregar a página (MUITO mais rápido)
    function resetarApp() {
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('priceSection').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('inputManual').value = "";
        document.getElementById('inputPreco').value = "";
        document.getElementById('scannerArea').style.display = 'block';
        
        if (!scannerIniciado) iniciarCamera();
    }

    function atualizarInterfaceProgresso(stats) {
        if (!stats || stats.total === 0) return;
        const lidos = Math.min(stats.lidos, stats.total);
        const porc = (lidos / stats.total) * 100;
        document.getElementById('barraProgresso').style.width = porc + "%";
        document.getElementById('txtProgresso').innerText = `${lidos} de ${stats.total}`;
    }

    function atualizarProgressoManual() {
        let stats = JSON.parse(localStorage.getItem('stats_coleta') || '{"lidos":0,"total":0}');
        stats.lidos++;
        localStorage.setItem('stats_coleta', JSON.stringify(stats));
        atualizarInterfaceProgresso(stats);
    }

    // Inicialização
    window.addEventListener('load', () => {
        iniciarCamera();
        
        const salvo = localStorage.getItem('stats_coleta');
        if (salvo) atualizarInterfaceProgresso(JSON.parse(salvo));

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.log(e));
        }
    });

    VMasker(document.getElementById("inputPreco")).maskMoney({
        precision: 2, separator: ',', delimiter: '.', unit: 'R$', zeroCents: false
    });
</script>
</body>
</html>
