<!-- Substitua a função enviarCodigo por esta no seu index.html -->
<script>
    async function enviarCodigo(codigo) {
        if (!codigo) return;
        
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.className = '';
        resultDiv.innerHTML = "Buscando...";

        // Certifique-se de que esta URL é a de "Implantação" e termina em /exec
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwfhj30NWTl2vXea_mqFAO21lo9s1yiLJt0S5YCDAUhq9JKEyar6qNL_p4DKO-UZCSE/exec"; 

        try {
            const response = await fetch(URL_SCRIPT, {
                method: "POST",
                mode: "cors", 
                body: JSON.stringify({ barcode: codigo.trim() }),
                headers: {
                    // Usar text/plain evita que o navegador faça o "pre-flight request" que causa erro de CORS
                    "Content-Type": "text/plain;charset=utf-8"
                }
            });
            
            const res = await response.json();
            
            if(res.status === "erro" || res.nome === "Não encontrado") {
                resultDiv.innerHTML = "❌ Produto não cadastrado.";
                resultDiv.style.color = "red";
            } else {
                resultDiv.className = 'success';
                resultDiv.style.color = "#155724";
                resultDiv.innerHTML = `<strong>Produto:</strong> ${res.nome}<br><strong>Valor:</strong> R$ ${res.preco}`;
            }
        } catch (error) {
            resultDiv.innerHTML = "Erro na conexão ou no Script Google.";
            console.error("Erro:", error);
        }
    }
</script>
